<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker | Новая привычка</title>
<link rel="stylesheet" href="/css/style.css">
<script src="/js/create-habit.js" defer></script>
</head>
<body>

<header class="main-header">
    <h2>Создание привычки</h2>
    <a href="/html/dashboard.html" class="btn-secondary">← Назад</a>
</header>

<div class="form-wrapper">

    <div class="form-card">
        <h3>Новая привычка</h3>
        <p class="subtitle">Добавьте привычку и начните отслеживание</p>

        <form class="habit-form">
            <div class="form-group">
                <label>Название привычки</label>
                <input type="text" placeholder="Например: Читать 20 минут" id="title">
            </div>

            <div class="form-group">
                <label>Описание</label>
                <textarea rows="4" placeholder="Краткое описание привычки..." id="description"></textarea>
            </div>

            
            <button type="button" class="btn-primary" id="submit">
                Создать привычку
            </button>

            <div id="message" class="message"></div>
            
        </form>
    </div>

</div>

</body>
</html>
