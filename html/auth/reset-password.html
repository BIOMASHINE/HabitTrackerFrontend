<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker | Новый пароль</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-body">

<div class="auth-card">

    <h1>Введите код</h1>
    <p class="subtitle">
        Введите код из письма и новый пароль
    </p>

    <form class="auth-form">

        <input type="text" placeholder="Код из письма" id="token">

        <input type="password" placeholder="Новый пароль" id="password">

        <button type="button" class="btn-primary" id="submit">
            Обновить пароль
        </button>

        <!-- Блок для сообщений -->
        <div id="message" class="message"></div>
    </form>

    <p class="switch-link">
        <a href="/html/edit-profile.html">Вернуться</a>
    </p>

<script>
    const token = document.getElementById('token');
    const password = document.getElementById('password');
    const submit = document.getElementById('submit');
    const messageDiv = document.getElementById('message');

    function showMessage(text, type) {
        messageDiv.textContent = text;
        messageDiv.className = `message ${type}`;
    }

    submit.onclick = async function resetPassword() {
        const body = {
            'token': token.value,
            'password': password.value
        };

        try {
            const response = await fetch(
                'https://habittracker-production-api.up.railway.app/api/v1/auth/reset-password/',
                {
                    method: 'POST',
                    headers: {
                        'accept': 'application/json',
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('access_token')}`
                    },
                    body: JSON.stringify(body)
                }
            );

            if (response.ok) {
                showMessage('Пароль успешно изменён! Перенаправление...', 'success');
                setTimeout(() => {
                    window.location.href = '/html/dashboard.html';
                }, 1500);
            } else {
                let errorMsg = 'Ошибка при сбросе пароля';
                try {
                    const errorData = await response.json();
                    if (errorData.detail) errorMsg = errorData.detail;
                } catch (e) {}
                showMessage(errorMsg, 'error');
            }
        } catch (error) {
            showMessage('Ошибка сети или сервера. Проверьте подключение.', 'error');
        }
    };
</script>
</div>

</body>
</html>
