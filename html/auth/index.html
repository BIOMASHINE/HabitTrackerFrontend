<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker | Вход</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="icon" href="/favicons/healthy-lifestyle.png">
<script src="/js/login.js" defer></script>
</head>
<body class="auth-body">

<div class="auth-card">
    <h1>Habit Tracker</h1>
    <p class="subtitle">Войдите в аккаунт</p>

    <form class="auth-form">
        <input type="email" placeholder="Email" id="email">
        <input type="password" placeholder="Пароль" id="password">
        <button type="button" class="btn-primary" id="login">
            Войти
        </button>

        <div id="login-message" class="message"></div>
    </form>

    <p class="switch-link">
        Нет аккаунта?
        <a href="/html/auth/register.html">Зарегистрироваться</a>
    </p>
</div>

</body>
</html>
