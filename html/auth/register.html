<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker | Регистрация</title>
<link rel="icon" href="/favicons/healthy-lifestyle.png">
<link rel="stylesheet" href="/css/style.css">
<script src="/js/register.js" defer></script>
</head>
<body class="auth-body">

<div class="auth-card">
    <h1>Создать аккаунт</h1>
    <p class="subtitle">Начните отслеживать привычки</p>

    <form class="auth-form">
        <input type="text" placeholder="Имя" id="username">
        <input type="email" placeholder="Email" id="email">
        <input type="password" placeholder="Пароль" id="password">
        <button type="button" class="btn-primary" id="register">
            Зарегистрироваться
        </button>
    </form>

    <p class="switch-link">
        Уже есть аккаунт?
        <a href="/html/auth/index.html">Войти</a>
    </p>

    <div id="register-message" class="message"></div>
</div>

</body>
</html>
