<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker | Подтверждение почты</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-body">

<div class="auth-card">

    <div class="confirm-icon">
        ✉️
    </div>

    <h1>Подтвердите почту</h1>

    <p class="subtitle">
        Мы отправили код подтверждения на вашу почту.<br>
        Введите его ниже, чтобы активировать аккаунт.
    </p>

    <form class="auth-form">

        <input type="text" placeholder="Введите код из письма" id="token">

        <button type="button" class="btn-primary" id="confirm email">
            Подтвердить почту
        </button>

        <!-- Блок для сообщений -->
        <div id="message" class="message"></div>

    </form>

    <!-- <p class="switch-link">
        Не получили письмо?
        <a href="#">Отправить повторно</a>
    </p> -->

    <p class="switch-link">
        <a href="/html/auth/index.html">Вернуться ко входу</a>
    </p>

    <script type="module">
        const email = localStorage.getItem('email');
        const tokenInput = document.getElementById('token');
        const confirmBtn = document.getElementById('confirm email');
        const messageDiv = document.getElementById('message');

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
        }

        confirmBtn.onclick = async () => {
            const token = tokenInput.value.trim();

            if (!token) {
                showMessage('Введите код из письма', 'error');
                return;
            }

            const body = {
                token: token
                // email не отправляем, потому что API /verify требует только token? 
                // В fastapi-users обычно нужен и email, но если ваш бэкенд настроен иначе, оставим так.
            };

            try {
                const response = await fetch(
                    'https://habittracker-production-api.up.railway.app/api/v1/auth/verify',
                    {
                        method: 'POST',
                        headers: {
                            'accept': 'application/json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(body)
                    }
                );

                if (response.ok) {
                    showMessage('Почта подтверждена! Перенаправление...', 'success');
                    localStorage.removeItem('email');
                    setTimeout(() => {
                        window.location.href = '/html/dashboard.html';
                    }, 1500);
                } else {
                    let errorMsg = 'Ошибка подтверждения';
                    try {
                        const errorData = await response.json();
                        if (errorData.detail) errorMsg = errorData.detail;
                    } catch (e) {}
                    showMessage(errorMsg, 'error');
                }
            } catch (error) {
                showMessage('Ошибка сети или сервера. Проверьте подключение.', 'error');
            }
        };
    </script>

</div>

</body>
</html>
